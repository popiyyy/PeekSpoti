services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peekspoti-app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      # Anonymous volumes to prevent host machine's node_modules and vendor 
      # from overwriting the files built inside the container
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  db:
    image: postgres:16-alpine
    container_name: peekspoti-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-peekspoti}
      POSTGRES_USER: ${DB_USERNAME:-peekspoti}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-peekspoti} -d ${DB_DATABASE:-peekspoti}"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  db-data:
